<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Reshelved — Swap, Donate & Resell Books in Kenya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/line-awesome/1.3.0/line-awesome/css/line-awesome.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      a[aria-label="Share on X"]{display:none!important;}
      input[type="range"]{height:8px;border-radius:999px;background:#e7e5e4;appearance:none;-webkit-appearance:none;}
      input[type="range"]::-webkit-slider-runnable-track{height:8px;border-radius:999px;background:transparent;}
      input[type="range"]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:20px;height:20px;margin-top:-6px;border-radius:999px;background:#fff;border:3px solid #1665CC;box-shadow:0 2px 8px rgba(0,0,0,.16);}
      input[type="range"]::-moz-range-track{height:8px;border-radius:999px;background:transparent;}
      input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:999px;background:#fff;border:3px solid #1665CC;box-shadow:0 2px 8px rgba(0,0,0,.16);}
      @media (max-width:639px){
        a.group[href^="/messages/"]>div.flex.items-center{position:relative!important;align-items:flex-start!important;padding-right:20px!important;}
        a.group[href^="/messages/"]>div.flex.items-center>.min-w-0.flex-1{min-width:0!important;padding-right:0!important;}
        a.group[href^="/messages/"]>div.flex.items-center>.min-w-0.flex-1>div:first-child{display:block!important;padding-right:58px!important;}
        a.group[href^="/messages/"]>div.flex.items-center>.min-w-0.flex-1>div:first-child>span:first-child{display:block!important;max-width:100%!important;overflow:hidden!important;text-overflow:ellipsis!important;white-space:nowrap!important;}
        a.group[href^="/messages/"]>div.flex.items-center>.min-w-0.flex-1>div:first-child>span:last-child{position:absolute!important;right:20px!important;top:17px!important;width:auto!important;min-width:0!important;text-align:right!important;display:block!important;}
        a.group[href^="/messages/"]>div.flex.items-center>span.flex.h-6.min-w-6{position:absolute!important;right:20px!important;top:48px!important;margin:0!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"]{top:64px!important;bottom:0!important;height:calc(100dvh - 64px)!important;align-items:flex-start!important;overflow-y:auto!important;padding-top:8px!important;padding-bottom:14px!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"]>.flex{max-height:none!important;min-height:0!important;width:100%!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"] .min-h-\[430px\]{min-height:300px!important;padding:14px!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"] .max-w-\[560px\]{max-width:min(82vw,360px)!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"] .px-5.py-4{padding-top:12px!important;padding-bottom:12px!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"] .p-5{padding:14px!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"] .grid.min-h-0.flex-1{display:block!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"] .grid.min-h-0.flex-1>.flex.flex-col{display:flex!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"] .grid.min-h-0.flex-1>.flex.flex-col>div:first-child{display:none!important;}
        .fixed.inset-0.z-50[class*="bg-stone-950"] .grid.min-h-0.flex-1>.flex.flex-col .mt-auto{margin-top:14px!important;padding-top:0!important;}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('DOMContentLoaded', function () {
        var updateBackLabels = function () {
          document.querySelectorAll('button').forEach(function (button) {
            if ((button.textContent || '').trim() === '← Browse listings') button.textContent = '← Back';
          });
        };

        var addLoggedOutContactButton = function () {
          var path = window.location.pathname || '';
          if (!path.startsWith('/profile/')) return;
          if (document.querySelector('[data-login-contact-button="true"]')) return;
          if (document.querySelector('button i.la-comment')) return;
          var profileCard = document.querySelector('aside .rounded-\[32px\] .flex.flex-col.items-center.text-center');
          if (!profileCard) return;
          var button = document.createElement('a');
          button.href = '/login';
          button.dataset.loginContactButton = 'true';
          button.className = 'mt-6 inline-flex w-full cursor-pointer items-center justify-center gap-2 rounded-full bg-[#FF5F57] px-5 py-3 text-sm font-bold text-white transition hover:bg-[#e84f48]';
          button.innerHTML = '<i class="las la-comment text-lg"></i>Log in to Contact';
          profileCard.appendChild(button);
        };

        var paintRange = function (range) {
          var min = Number(range.min || 0);
          var max = Number(range.max || 100);
          var value = Number(range.value || min);
          var percent = max > min ? ((value - min) / (max - min)) * 100 : 0;
          range.style.background = 'linear-gradient(90deg, #1665CC 0%, #1665CC ' + percent + '%, #e7e5e4 ' + percent + '%, #e7e5e4 100%)';
        };

        var paintRanges = function () {
          document.querySelectorAll('input[type="range"]').forEach(paintRange);
        };

        updateBackLabels();
        addLoggedOutContactButton();
        paintRanges();
        document.addEventListener('input', function (event) {
          if (event.target && event.target.matches && event.target.matches('input[type="range"]')) paintRange(event.target);
        }, true);
        document.addEventListener('change', function (event) {
          if (event.target && event.target.matches && event.target.matches('input[type="range"]')) paintRange(event.target);
        }, true);
        document.addEventListener('click', function (event) {
          var button = event.target && event.target.closest ? event.target.closest('button') : null;
          if (button && (button.textContent || '').trim() === 'Reset') {
            window.setTimeout(paintRanges, 0);
            window.setTimeout(paintRanges, 60);
          }
        }, true);
        new MutationObserver(function () { updateBackLabels(); addLoggedOutContactButton(); paintRanges(); }).observe(document.body, { childList: true, subtree: true });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
